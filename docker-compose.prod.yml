version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: uzum_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uzum_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uzum_password}
      POSTGRES_DB: ${POSTGRES_DB:-uzum_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uzum_network

  redis:
    image: redis:7-alpine
    container_name: uzum_redis_prod
    restart: always
    networks:
      - uzum_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzum_backend_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-uzum_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY required in production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENV=production
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - JWT_ALGORITHM=HS256
    depends_on:
      - db
      - redis
    networks:
      - uzum_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzum_celery_worker_prod
    restart: always
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-uzum_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY required in production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENV=production
    depends_on:
      - db
      - redis
      - backend
    networks:
      - uzum_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uzum_frontend_prod
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    networks:
      - uzum_network

  nginx:
    image: nginx:alpine
    container_name: uzum_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - uzum_network

volumes:
  postgres_data:

networks:
  uzum_network:
    driver: bridge
