services:
  db:
    image: postgres:15-alpine
    container_name: uzum_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uzum_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uzum_password}
      POSTGRES_DB: ${POSTGRES_DB:-uzum_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uzum_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzum_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-uzum_user}:${POSTGRES_PASSWORD:-uzum_password}@db:5432/${POSTGRES_DB:-uzum_db}
      - REDIS_URL=redis://redis:6379/0
      # SECRET_KEY env'da MAJBURIY berilishi kerak. Default qiymat yo'q —
      # productionda tasodifiy generatsiya qilish uchun:
      #   python -c "import secrets; print(secrets.token_urlsafe(64))"
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY environment variable is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENV=${ENV:-development}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzum_celery_worker
    restart: always
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-uzum_user}:${POSTGRES_PASSWORD:-uzum_password}@db:5432/${POSTGRES_DB:-uzum_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uzum_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
